name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Maven verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Eclipse Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17.0.17+10
          cache: maven

      - name: Show wrapper toolchain
        run: ./mvnw -version

      - name: Verify reactor
        run: ./mvnw -B -ntp verify

      - name: Verify module test reports
        run: ./scripts/verify-test-reports.sh

      - name: Upload verification reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
            **/target/site/jacoco/**
          if-no-files-found: ignore
